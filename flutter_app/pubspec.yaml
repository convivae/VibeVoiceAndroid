name: vibevoice_app
description: VibeVoice Android - Cloud ASR Voice Input App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State management (per D-12) — v2.x for StateNotifier API compatibility
  flutter_riverpod: ^2.5.1
  
  # Audio recording (per D-09 — package is 'record', NOT 'flutter_record')
  record: ^6.2.0
  
  # Audio playback (per Phase 2 decision)
  flutter_soloud: ^3.2.1

  # WebSocket client (per RESEARCH.md §1.2)
  web_socket_channel: ^3.0.1
  
  # HTTP client for health checks
  dio: ^5.7.0
  
  # Permission handling
  permission_handler: ^11.3.1
  
  # Routing
  go_router: ^14.6.2
  
  # Network connectivity
  connectivity_plus: ^6.1.1

  # TFLite for on-device ASR inference (D-15)
  tflite_flutter: ^0.12.1

  # Path resolution for model file storage
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
